# Smart CA production frontend (nginxinc/nginx-unprivileged — listens on 8080)
# Upstream "api" is the Compose service name (Docker network DNS only).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression for hashed JS/CSS payloads
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Security headers (compatible with SPA; CSP intentionally omitted)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Lightweight health for Compose / load balancers (web process)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Proxy API liveness/readiness so host clients can probe via published :8080
    location = /health/live {
        proxy_pass http://api:8080/health/live;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /health/ready {
        proxy_pass http://api:8080/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Reverse proxy to Go API (Compose service: api:8080)
    # Browser calls /api/v1/... (same origin); nginx forwards to the API container.
    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $http_x_request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Do not cache API responses at the proxy
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
    }

    # Hashed Vite assets — long-lived immutable cache
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Static icons from public/
    location ~* \.(?:svg|ico)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # SPA fallback — never long-cache index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
