# Smart CA full-stack Compose (modern Compose Specification — no obsolete top-level version)
#
# Workspace layout (required):
#   SmartCA/
#     Go/                 backend (build context)
#     saas/               frontend (build context; folder name is lowercase)
#     docker-compose.yml  this file
#     .env                optional overrides (copy from .env.example — never commit it)
#
# Startup order:  db (PostgreSQL) → api (Go, runs migrations + seed on boot) → web (nginx + React)
#
# Browser → web (:8080) → /api/* proxied to api:8080 → PostgreSQL (db:5432)
#
# Intended commands on a Docker-capable host:
#   docker compose up --build
#   docker compose ps
#   docker compose logs -f
#   docker compose down          # keeps the "db-data" volume (data persists)
#   docker compose down -v       # also removes the volume (full reset)
#
# All variables below have safe defaults, so `docker compose up --build` works with zero
# configuration. Override any of them via a root .env file (see .env.example).

name: smartca

services:
  db:
    image: postgres:18-alpine
    container_name: smartca-db
    environment:
      POSTGRES_USER: ${DB_USER:-smartca}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartca}
      POSTGRES_DB: ${DB_NAME:-smartca}
    volumes:
      # Postgres 18+ uses PGDATA=/var/lib/postgresql/<major>/docker — mount the parent directory.
      - db-data:/var/lib/postgresql
    # Database is reached via the Compose network only. No host publish by default.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartca} -d ${DB_NAME:-smartca}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - smartca-net

  api:
    build:
      context: ./Go
      dockerfile: Dockerfile
    image: smartca-api:local
    container_name: smartca-api
    environment:
      APP_ENV: production
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8080"
      # Browser Origin is the published web URL (same-origin /api proxy).
      FRONTEND_ORIGIN: "http://localhost:8080,http://127.0.0.1:8080"
      LOG_LEVEL: info
      SESSION_TTL: 30m
      DEMO_RESET_ENABLED: "true"
      # PostgreSQL — "db" is the Compose service DNS name.
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-smartca}
      DB_PASSWORD: ${DB_PASSWORD:-smartca}
      DB_NAME: ${DB_NAME:-smartca}
      DB_SSLMODE: disable
      # Gemini AI (server-side only). Leave empty to run with the mock provider.
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      db:
        condition: service_healthy
    # API is reached via the Compose network only (nginx upstream). No host publish.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "/app/smartca-api", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - smartca-net

  web:
    build:
      context: ./saas
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_APP_NAME: Smart CA
    image: smartca-web:local
    container_name: smartca-web
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # nginx needs writable cache/pid paths; prefer not read_only for web
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - smartca-net

networks:
  smartca-net:
    driver: bridge

volumes:
  db-data:
    driver: local
