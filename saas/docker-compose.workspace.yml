# MIRROR of workspace-root docker-compose.yml for the GitHub (saas) repo.
# Build contexts assume sibling directories:
#   <workspace>/Go
#   <workspace>/saas   ← this repository checked out here
#
# From <workspace>:
#   docker compose -f saas/docker-compose.workspace.yml up -d --build
#
# Prefer the canonical file at the workspace root when present:
#   docker compose -f docker-compose.yml up -d --build
#
# Docker Compose was NOT executed in the authoring environment.

name: smartca

services:
  api:
    build:
      context: ../Go
      dockerfile: Dockerfile
    image: smartca-api:local
    environment:
      APP_ENV: production
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8080"
      FRONTEND_ORIGIN: "http://localhost:8080,http://127.0.0.1:8080"
      LOG_LEVEL: info
      SESSION_TTL: 30m
      DEMO_RESET_ENABLED: "true"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "/app/smartca-api", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_APP_NAME: Smart CA
    image: smartca-web:local
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
